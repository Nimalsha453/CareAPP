name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build with Buildozer
        # Kivy Buildozer Action
        uses: kivy/buildozer-action@master
        with:
          workdir: .
          buildozer_config: buildozer.spec

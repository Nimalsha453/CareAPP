name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          sudo apt update
          # මෙහි libtinfo5 වෙනුවට libtinfo6 ලෙස වෙනස් කර ඇත
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython kivy

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11' # 3.12 වෙනුවට 3.11 භාවිතා කරමු

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          # setuptools මගින් distutils ගැටලුව විසඳයි
          pip install buildozer cython kivy setuptools

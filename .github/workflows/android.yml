name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build with Buildozer
        # මෙම Action එක වඩාත් ස්ථාවරයි
        uses: Niklas-Scherer/buildozer-action@v1
        with:
          buildozer_version: master
          workdir: .